name: GCP Deploy

on:
  push:
    branches:
      - GCPelop
  workflow_dispatch:

concurrency:
  group: GCP-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy To GCP Server
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant Gradle Wrapper Permission
        run: chmod +x ./gradlew

      - name: Build Boot Jar
        run: ./gradlew clean bootJar --no-daemon

      - name: Upload Jar To Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          port: ${{ secrets.GCP_PORT || 22 }}
          source: "build/libs/*.jar"
          target: ${{ secrets.GCP_APP_DIR }}
          strip_components: 1

      - name: Restart Application
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_DIR: ${{ secrets.GCP_APP_DIR }}
          SPRING_PROFILES_ACTIVE: ${{ secrets.GCP_SPRING_PROFILE }}
          SERVER_PORT: ${{ secrets.GCP_SERVER_PORT }}
          DB_URL: ${{ secrets.GCP_DB_URL }}
          DB_USERNAME: ${{ secrets.GCP_DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.GCP_DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.GCP_JWT_SECRET }}
          GCP_STORAGE_BUCKET: ${{ secrets.GCP_GCP_STORAGE_BUCKET }}
          GCP_PROJECT_ID: ${{ secrets.GCP_GCP_PROJECT_ID }}
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          port: ${{ secrets.GCP_PORT || 22 }}
          envs: APP_DIR,SPRING_PROFILES_ACTIVE,SERVER_PORT,DB_URL,DB_USERNAME,DB_PASSWORD,JWT_SECRET,JWT_ACCESS_TOKEN_VALIDITY_MS,JWT_REFRESH_TOKEN_VALIDITY_MS,KAKAO_REST_API_KEY,KAKAO_LOCAL_BASE_URL,AWS_S3_BUCKET,AWS_REGION,GCP_STORAGE_BUCKET,GCP_PROJECT_ID
          script_stop: true
          script: |
            set -eu
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            LATEST_JAR="$(find . -maxdepth 1 -type f -name '*.jar' ! -name 'app.jar' -printf '%T@ %p\n' | sort -nr | head -n 1 | cut -d' ' -f2-)"
            if [ -z "$LATEST_JAR" ]; then
              echo "No jar file was uploaded."
              exit 1
            fi

            mv "$LATEST_JAR" app.jar

            cat > .env <<EOF
            SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}
            SERVER_PORT=${SERVER_PORT}
            DB_URL=${DB_URL}
            DB_USERNAME=${DB_USERNAME}
            DB_PASSWORD=${DB_PASSWORD}
            JWT_SECRET=${JWT_SECRET}
            GCP_STORAGE_BUCKET=${GCP_STORAGE_BUCKET}
            GCP_PROJECT_ID=${GCP_PROJECT_ID}
            EOF

            if pgrep -f "java -jar .*app.jar" >/GCP/null 2>&1; then
              pkill -f "java -jar .*app.jar"
              sleep 5
            fi

            nohup java -jar app.jar > app.log 2>&1 &
            sleep 15

            if ! pgrep -f "java -jar .*app.jar" >/GCP/null 2>&1; then
              echo "Application failed to start."
              tail -n 100 app.log || true
              exit 1
            fi
