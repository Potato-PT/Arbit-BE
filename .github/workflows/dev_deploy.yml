name: GCP Deploy

on:
  push:
    branches: 'main'
  workflow_dispatch:

concurrency:
  group: GCP-deploy
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Build And Deploy
    runs-on: ubuntu-latest
    env:
      GCP_JWT_SECRET: ${{ secrets.GCP_JWT_SECRET }}
      JWT_ACCESS_TOKEN_VALIDITY_MS: 3600000
      JWT_REFRESH_TOKEN_VALIDITY_MS: 604800000
      KAKAO_LOCAL_BASE_URL: https://dapi.kakao.com
      KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Jar
        run: sh ./gradlew bootJar --no-daemon

      - name: Prepare Deploy Bundle
        env:
          GCP_JWT_SECRET: ${{ secrets.GCP_JWT_SECRET }}
          MYSQL_DATABASE: ${{ vars.MYSQL_DATABASE || 'arbit' }}
          MYSQL_USER: ${{ vars.MYSQL_USER || 'arbit' }}
          APP_DB_PASSWORD: ${{ secrets.APP_DB_PASSWORD }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          ARBIT_AI_ENV: ${{ secrets.ARBIT_AI_ENV }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_LOCAL_BASE_URL: https://dapi.kakao.com
          JWT_ACCESS_TOKEN_VALIDITY_MS: 3600000
          JWT_REFRESH_TOKEN_VALIDITY_MS: 604800000
        run: |
          test -n "${APP_DB_PASSWORD}" || { echo 'APP_DB_PASSWORD secret is required'; exit 1; }
          test -n "${MYSQL_ROOT_PASSWORD}" || { echo 'MYSQL_ROOT_PASSWORD secret is required'; exit 1; }
          test -n "${ARBIT_AI_ENV}" || { echo 'ARBIT_AI_ENV secret is required'; exit 1; }
          mkdir -p deploy/build/libs
          cp Dockerfile deploy/Dockerfile
          cp docker-compose.yml deploy/docker-compose.yml
          cp docker-entrypoint.sh deploy/docker-entrypoint.sh
          cp build/libs/*.jar deploy/build/libs/
          printf '%s\n' "${ARBIT_AI_ENV}" > deploy/arbit-ai.env
          {
            echo "SPRING_PROFILES_ACTIVE=default"
            echo "MYSQL_DATABASE=${MYSQL_DATABASE}"
            echo "MYSQL_USER=${MYSQL_USER}"
            echo "MYSQL_PASSWORD=${APP_DB_PASSWORD}"
            echo "MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}"
            echo "APP_DB_URL=jdbc:mysql://arbit-db:3306/${MYSQL_DATABASE}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8"
            echo "APP_DB_USERNAME=${MYSQL_USER}"
            echo "APP_DB_PASSWORD=${APP_DB_PASSWORD}"
            echo "ARBIT_AI_BASE_URL=http://arbit-ai:8000"
            echo "GCP_JWT_SECRET=${GCP_JWT_SECRET}"
            echo "KAKAO_REST_API_KEY=${KAKAO_REST_API_KEY}"
            echo "KAKAO_LOCAL_BASE_URL=${KAKAO_LOCAL_BASE_URL}"
            echo "JWT_ACCESS_TOKEN_VALIDITY_MS=${JWT_ACCESS_TOKEN_VALIDITY_MS}"
            echo "JWT_REFRESH_TOKEN_VALIDITY_MS=${JWT_REFRESH_TOKEN_VALIDITY_MS}"
          } > deploy/.env

      - name: Set Up SSH
        env:
          GCP_SSH_KEY: ${{ secrets.GCP_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$GCP_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${{ vars.GCP_PORT || 22 }}" "${{ vars.GCP_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync Deploy Bundle To Server
        run: |
          rsync -avz --delete -e "ssh -p ${{ vars.GCP_PORT || 22 }}" deploy/ "${{ vars.GCP_USERNAME }}@${{ vars.GCP_HOST }}:/home/lalalove0310/arbit/"

      - name: Build And Restart
        run: |
          ssh -p "${{ vars.GCP_PORT || 22 }}" "${{ vars.GCP_USERNAME }}@${{ vars.GCP_HOST }}" "
            cd /home/lalalove0310/arbit
            ls -la
            test -f .env || { echo '.env not found after rsync'; exit 1; }
            test -f arbit-ai.env || { echo 'arbit-ai.env not found after rsync'; exit 1; }
            mkdir -p ../arbit-ai
            cp arbit-ai.env ../arbit-ai/.env
            chmod 600 ../arbit-ai/.env
            rm -f arbit-ai.env
            docker compose up -d --build
            docker compose ps -a
            docker compose logs --tail=200 db
            docker compose logs --tail=200 app
          "
