name: GCP Deploy

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: GCP-deploy
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Build And Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload Source To Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.GCP_HOST }}
          username: ${{ vars.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          port: ${{ vars.GCP_PORT || 22 }}
          source: "."
          target: /home/lalalove0310/arbit
          rm: true

      - name: Build And Restart
        uses: appleboy/ssh-action@v1.0.3
        env:
          DB_URL: ${{ vars.GCP_DB_URL }}
          DB_USERNAME: ${{ vars.GCP_DB_USERNAME }}
          JWT_SECRET: ${{ secrets.GCP_JWT_SECRET }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
        with:
          host: ${{ vars.GCP_HOST }}
          username: ${{ vars.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          port: ${{ vars.GCP_PORT || 22 }}
          command_timeout: 15m
          envs: DB_URL,DB_USERNAME,JWT_SECRET,KAKAO_REST_API_KEY
          script: |
            cd /home/lalalove0310/arbit

            cat > .env <<EOF
            DB_URL=${DB_URL}
            DB_USERNAME=${DB_USERNAME}
            JWT_SECRET=${JWT_SECRET}
            KAKAO_REST_API_KEY=${KAKAO_REST_API_KEY}
            EOF

            docker compose down
            docker compose up -d --build