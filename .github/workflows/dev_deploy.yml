name: GCP Deploy

on:
  push:
    branches: 'main'
  workflow_dispatch:

concurrency:
  group: GCP-deploy
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Build And Deploy
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: ci-test-jwt-secret-key-must-be-at-least-32-bytes
      JWT_ACCESS_TOKEN_VALIDITY_MS: 3600000
      JWT_REFRESH_TOKEN_VALIDITY_MS: 604800000
      KAKAO_LOCAL_BASE_URL: https://dapi.kakao.com
      KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Jar
        run: sh ./gradlew test bootJar --no-daemon

      - name: Prepare Deploy Bundle
        run: |
          mkdir -p deploy/build/libs
          cp Dockerfile deploy/Dockerfile
          cp docker-compose.yml deploy/docker-compose.yml
          cp docker-entrypoint.sh deploy/docker-entrypoint.sh
          cp build/libs/*.jar deploy/build/libs/

      - name: Upload Deploy Bundle To Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.GCP_HOST }}
          username: ${{ vars.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          port: ${{ vars.GCP_PORT || 22 }}
          source: "deploy/Dockerfile,deploy/docker-compose.yml,deploy/docker-entrypoint.sh,deploy/build/libs/*.jar"
          target: /home/lalalove0310/arbit
          strip_components: 1

      - name: Build And Restart
        uses: appleboy/ssh-action@v1.0.3
        env:
          DB_URL: ${{ vars.GCP_DB_URL }}
          DB_USERNAME: ${{ vars.GCP_DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.GCP_DB_PASSWORD }}
          GCP_JWT_SECRET: ${{ secrets.GCP_JWT_SECRET }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_LOCAL_BASE_URL: https://dapi.kakao.com
          JWT_ACCESS_TOKEN_VALIDITY_MS: 3600000
          JWT_REFRESH_TOKEN_VALIDITY_MS: 604800000
        with:
          host: ${{ vars.GCP_HOST }}
          username: ${{ vars.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          port: ${{ vars.GCP_PORT || 22 }}
          command_timeout: 15m
          envs: DB_URL,DB_USERNAME,DB_PASSWORD,GCP_JWT_SECRET,KAKAO_REST_API_KEY,KAKAO_LOCAL_BASE_URL,JWT_ACCESS_TOKEN_VALIDITY_MS,JWT_REFRESH_TOKEN_VALIDITY_MS
          script: |
            cd /home/lalalove0310/arbit
            docker compose build app
            docker compose up -d app
            docker compose logs --tail=200 app
