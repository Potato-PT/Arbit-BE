name: GCP Deploy

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: GCP-deploy
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Build And Upload Jar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant Gradle Wrapper Permission
        run: chmod +x ./gradlew

      - name: Build Boot Jar
        run: ./gradlew clean bootJar --no-daemon
        env:
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}

      - name: Upload Jar To Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.GCP_HOST }}
          username: ${{ vars.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          port: ${{ vars.GCP_PORT || 22 }}
          source: "build/libs/*.jar"
          target: ${{ vars.GCP_APP_DIR }}
          strip_components: 2

  restart:
    name: Restart Application
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Restart Application
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_DIR: ${{ vars.GCP_APP_DIR }}
          SERVER_PORT: ${{ vars.GCP_SERVER_PORT || 8080 }}
          DB_URL: ${{ secrets.GCP_DB_URL }}
          DB_USERNAME: ${{ vars.GCP_DB_USERNAME }}
          JWT_SECRET: ${{ secrets.GCP_JWT_SECRET }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
        with:
          host: ${{ vars.GCP_HOST }}
          username: ${{ vars.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          port: ${{ vars.GCP_PORT || 22 }}
          command_timeout: 5m        # ← 명시적으로 설정
          envs: APP_DIR,SERVER_PORT,DB_URL,DB_USERNAME,JWT_SECRET,KAKAO_REST_API_KEY
          script_stop: true
          script: |
            set -eu
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            LATEST_JAR="$(find . -maxdepth 1 -type f -name '*.jar' ! -name 'app.jar' -printf '%T@ %p\n' | sort -nr | head -n 1 | cut -d' ' -f2-)"
            if [ -z "$LATEST_JAR" ]; then
              echo "No jar file was uploaded."
              exit 1
            fi

            mv "$LATEST_JAR" app.jar

            cat > .env <<EOF
            SERVER_PORT=${SERVER_PORT}
            DB_URL=${DB_URL}
            DB_USERNAME=${DB_USERNAME}
            JWT_SECRET=${JWT_SECRET}
            KAKAO_REST_API_KEY=${KAKAO_REST_API_KEY}
            EOF

            if pgrep -f "java -jar .*app.jar" >/dev/null 2>&1; then
              pkill -f "java -jar .*app.jar"
              sleep 5
            fi

            nohup java -jar app.jar > app.log 2>&1 &
            disown $!               # ← SSH 세션 종료 시 프로세스 분리 (핵심)

            sleep 15

            if ! pgrep -f "java -jar .*app.jar" >/dev/null 2>&1; then
              echo "Application failed to start."
              tail -n 100 app.log || true
              exit 1
            fi

            echo "Application started successfully."