name: GCP Deploy

on:
  push:
    branches: 'main'
  workflow_dispatch:

concurrency:
  group: GCP-deploy
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Build And Deploy
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: ci-test-jwt-secret-key-must-be-at-least-32-bytes
      JWT_ACCESS_TOKEN_VALIDITY_MS: 3600000
      JWT_REFRESH_TOKEN_VALIDITY_MS: 604800000
      KAKAO_LOCAL_BASE_URL: https://dapi.kakao.com
      KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Jar
        run: sh ./gradlew test bootJar --no-daemon

      - name: Prepare Deploy Bundle
        run: |
          mkdir -p deploy/build/libs
          cp Dockerfile deploy/Dockerfile
          cp docker-compose.yml deploy/docker-compose.yml
          cp docker-entrypoint.sh deploy/docker-entrypoint.sh
          cp build/libs/*.jar deploy/build/libs/

      - name: Set Up SSH
        env:
          GCP_SSH_KEY: ${{ secrets.GCP_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$GCP_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${{ vars.GCP_PORT || 22 }}" "${{ vars.GCP_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync Deploy Bundle To Server
        run: |
          rsync -avz --delete -e "ssh -p ${{ vars.GCP_PORT || 22 }}" deploy/ "${{ vars.GCP_USERNAME }}@${{ vars.GCP_HOST }}:/home/lalalove0310/arbit/"

      - name: Build And Restart
        env:
          DB_URL: ${{ vars.GCP_DB_URL }}
          DB_USERNAME: ${{ vars.GCP_DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.GCP_DB_PASSWORD }}
          GCP_JWT_SECRET: ${{ secrets.GCP_JWT_SECRET }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_LOCAL_BASE_URL: https://dapi.kakao.com
          JWT_ACCESS_TOKEN_VALIDITY_MS: 3600000
          JWT_REFRESH_TOKEN_VALIDITY_MS: 604800000
        run: |
          DB_URL_Q=$(printf '%q' "$DB_URL")
          DB_USERNAME_Q=$(printf '%q' "$DB_USERNAME")
          DB_PASSWORD_Q=$(printf '%q' "$DB_PASSWORD")
          GCP_JWT_SECRET_Q=$(printf '%q' "$GCP_JWT_SECRET")
          KAKAO_REST_API_KEY_Q=$(printf '%q' "$KAKAO_REST_API_KEY")
          KAKAO_LOCAL_BASE_URL_Q=$(printf '%q' "$KAKAO_LOCAL_BASE_URL")
          JWT_ACCESS_TOKEN_VALIDITY_MS_Q=$(printf '%q' "$JWT_ACCESS_TOKEN_VALIDITY_MS")
          JWT_REFRESH_TOKEN_VALIDITY_MS_Q=$(printf '%q' "$JWT_REFRESH_TOKEN_VALIDITY_MS")
          ssh -p "${{ vars.GCP_PORT || 22 }}" "${{ vars.GCP_USERNAME }}@${{ vars.GCP_HOST }}" "
            export DB_URL=${DB_URL_Q}
            export DB_USERNAME=${DB_USERNAME_Q}
            export DB_PASSWORD=${DB_PASSWORD_Q}
            export GCP_JWT_SECRET=${GCP_JWT_SECRET_Q}
            export KAKAO_REST_API_KEY=${KAKAO_REST_API_KEY_Q}
            export KAKAO_LOCAL_BASE_URL=${KAKAO_LOCAL_BASE_URL_Q}
            export JWT_ACCESS_TOKEN_VALIDITY_MS=${JWT_ACCESS_TOKEN_VALIDITY_MS_Q}
            export JWT_REFRESH_TOKEN_VALIDITY_MS=${JWT_REFRESH_TOKEN_VALIDITY_MS_Q}
            cd /home/lalalove0310/arbit
            docker compose build app
            docker compose up -d app
            docker compose logs --tail=200 app
          "
