name: GCP Deploy

on:
  push:
    branches: 'main'
  workflow_dispatch:

concurrency:
  group: GCP-deploy
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Build And Deploy
    runs-on: ubuntu-latest
    env:
      GCP_JWT_SECRET: ${{ secrets.GCP_JWT_SECRET }}
      JWT_ACCESS_TOKEN_VALIDITY_MS: 3600000
      JWT_REFRESH_TOKEN_VALIDITY_MS: 604800000
      KAKAO_LOCAL_BASE_URL: https://dapi.kakao.com
      KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Jar
        run: sh ./gradlew test bootJar --no-daemon

      - name: Prepare Deploy Bundle
        env:
          GCP_DB_URL: ${{ vars.GCP_DB_URL }}
          GCP_DB_USERNAME: ${{ vars.GCP_DB_USERNAME }}
          GCP_JWT_SECRET: ${{ secrets.GCP_JWT_SECRET }}
          GCP_DB_PASSWORD: ${{ secrets.GCP_DB_PASSWORD }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_LOCAL_BASE_URL: https://dapi.kakao.com
          JWT_ACCESS_TOKEN_VALIDITY_MS: 3600000
          JWT_REFRESH_TOKEN_VALIDITY_MS: 604800000
        run: |
          mkdir -p deploy/build/libs
          cp Dockerfile deploy/Dockerfile
          cp docker-compose.yml deploy/docker-compose.yml
          cp docker-entrypoint.sh deploy/docker-entrypoint.sh
          cp build/libs/*.jar deploy/build/libs/
          cat > deploy/.env <<EOF
          GCP_DB_URL=${GCP_DB_URL}
          GCP_DB_USERNAME=${GCP_DB_USERNAME}
          GCP_DB_PASSWORD=${GCP_DB_PASSWORD}
          GCP_JWT_SECRET=${GCP_JWT_SECRET}
          KAKAO_REST_API_KEY=${KAKAO_REST_API_KEY}
          KAKAO_LOCAL_BASE_URL=${KAKAO_LOCAL_BASE_URL}
          JWT_ACCESS_TOKEN_VALIDITY_MS=${JWT_ACCESS_TOKEN_VALIDITY_MS}
          JWT_REFRESH_TOKEN_VALIDITY_MS=${JWT_REFRESH_TOKEN_VALIDITY_MS}
          EOF

      - name: Set Up SSH
        env:
          GCP_SSH_KEY: ${{ secrets.GCP_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$GCP_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${{ vars.GCP_PORT || 22 }}" "${{ vars.GCP_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync Deploy Bundle To Server
        run: |
          rsync -avz --delete -e "ssh -p ${{ vars.GCP_PORT || 22 }}" deploy/ "${{ vars.GCP_USERNAME }}@${{ vars.GCP_HOST }}:/home/lalalove0310/arbit/"

      - name: Build And Restart
        run: |
          ssh -p "${{ vars.GCP_PORT || 22 }}" "${{ vars.GCP_USERNAME }}@${{ vars.GCP_HOST }}" "
            cd /home/lalalove0310/arbit
            ls -la
            test -f .env || { echo '.env not found after rsync'; exit 1; }
            docker compose build app
            docker compose up -d app
            docker compose logs --tail=200 app
          "
