name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: ci-test-jwt-secret-key-must-be-at-least-32-bytes
      JWT_ACCESS_TOKEN_VALIDITY_MS: 3600000
      JWT_REFRESH_TOKEN_VALIDITY_MS: 604800000
      KAKAO_LOCAL_BASE_URL: https://dapi.kakao.com
      KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - run: sh ./gradlew test bootJar --no-daemon
      - uses: actions/upload-artifact@v4
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          name: arbit-jar
          path: build/libs/*.jar

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: arbit-jar
          path: deploy/build/libs
      - run: |
          mkdir -p deploy
          cp Dockerfile deploy/Dockerfile
          cp docker-compose.yml deploy/docker-compose.yml
      - uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "deploy/*"
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 1
      - uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DEPLOY_PATH
          script: |
            cd "$DEPLOY_PATH"
            docker compose build app
            docker compose up -d app
