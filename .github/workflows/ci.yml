name: CI

on:
  push:
    branches: 'main'
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GCP_JWT_SECRET: ci-test-jwt-secret-key-must-be-at-least-32-bytes
      JWT_ACCESS_TOKEN_VALIDITY_MS: 3600000
      JWT_REFRESH_TOKEN_VALIDITY_MS: 604800000
      KAKAO_LOCAL_BASE_URL: https://dapi.kakao.com
      KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - run: sh ./gradlew test bootJar --no-daemon
      - uses: actions/upload-artifact@v4
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          name: arbit-jar
          path: build/libs/*.jar
