services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arbit-app
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
      SERVER_PORT: 8080
      APP_DB_URL: ${APP_DB_URL:-${GCP_DB_URL}}
      APP_DB_USERNAME: ${APP_DB_USERNAME:-${GCP_DB_USERNAME}}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-${GCP_DB_PASSWORD}}
      GCP_DB_URL: ${GCP_DB_URL:-${APP_DB_URL}}
      GCP_DB_USERNAME: ${GCP_DB_USERNAME:-${APP_DB_USERNAME}}
      GCP_DB_PASSWORD: ${GCP_DB_PASSWORD:-${APP_DB_PASSWORD}}
      GCP_JWT_SECRET: ${GCP_JWT_SECRET:?GCP_JWT_SECRET must be set}
      JWT_ACCESS_TOKEN_VALIDITY_MS: ${JWT_ACCESS_TOKEN_VALIDITY_MS:-3600000}
      JWT_REFRESH_TOKEN_VALIDITY_MS: ${JWT_REFRESH_TOKEN_VALIDITY_MS:-604800000}
      KAKAO_LOCAL_BASE_URL: ${KAKAO_LOCAL_BASE_URL:-https://dapi.kakao.com}
      KAKAO_REST_API_KEY: ${KAKAO_REST_API_KEY:-}
      ARBIT_AI_BASE_URL: ${ARBIT_AI_BASE_URL:-http://arbit-ai:8000}
      STORAGE_LOCAL_UPLOAD_DIR: /app/uploads
    ports:
      - "8080:8080"
    volumes:
      - app-uploads:/app/uploads
    depends_on:
      - arbit-ai
    networks:
      - arbit-network
    restart: unless-stopped

  arbit-ai:
    container_name: arbit-ai
    build:
      context: ../arbit-ai
      dockerfile: Dockerfile
    env_file:
      - ../arbit-ai/.env
    ports:
      - "8000:8000"
    networks:
      - arbit-network
    restart: unless-stopped

volumes:
  app-uploads:

networks:
  arbit-network:
