services:
  mysql:
    image: mysql:8.4
    container_name: arbit-mysql
    environment:
      MYSQL_DATABASE: arbit
      MYSQL_USER: arbit
      MYSQL_PASSWORD: arbit
      MYSQL_ROOT_PASSWORD: root
      TZ: Asia/Seoul
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

volumes:
  mysql-data:
