services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arbit-app
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
      SERVER_PORT: 8080
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_VALIDITY_MS: ${JWT_ACCESS_TOKEN_VALIDITY_MS:-3600000}
      JWT_REFRESH_TOKEN_VALIDITY_MS: ${JWT_REFRESH_TOKEN_VALIDITY_MS:-1209600000}
      KAKAO_REST_API_KEY: ${KAKAO_REST_API_KEY:-}
      STORAGE_LOCAL_UPLOAD_DIR: /app/uploads
    ports:
      - "8080:8080"
    volumes:
      - app-uploads:/app/uploads
    restart: unless-stopped

volumes:
  app-uploads: