services:
  db:
    image: mysql:8.0
    container_name: arbit-db
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-arbit}
      MYSQL_USER: ${MYSQL_USER:-arbit}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-${APP_DB_PASSWORD:?APP_DB_PASSWORD must be set}}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD must be set}
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - arbit-network
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arbit-app
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
      SERVER_PORT: 8080
      APP_DB_URL: ${APP_DB_URL:-jdbc:mysql://arbit-db:3306/${MYSQL_DATABASE:-arbit}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
      APP_DB_USERNAME: ${APP_DB_USERNAME:-${MYSQL_USER:-arbit}}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-${MYSQL_PASSWORD}}
      GCP_JWT_SECRET: ${GCP_JWT_SECRET:?GCP_JWT_SECRET must be set}
      JWT_ACCESS_TOKEN_VALIDITY_MS: ${JWT_ACCESS_TOKEN_VALIDITY_MS:-3600000}
      JWT_REFRESH_TOKEN_VALIDITY_MS: ${JWT_REFRESH_TOKEN_VALIDITY_MS:-604800000}
      KAKAO_LOCAL_BASE_URL: ${KAKAO_LOCAL_BASE_URL:-https://dapi.kakao.com}
      KAKAO_REST_API_KEY: ${KAKAO_REST_API_KEY:-}
      ARBIT_AI_BASE_URL: ${ARBIT_AI_BASE_URL:-http://arbit-ai:8000}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-}
      GCS_BUCKET_NAME: ${GCS_BUCKET_NAME:-}
      GCS_PUBLIC_BASE_URL: ${GCS_PUBLIC_BASE_URL:-}
      STORAGE_LOCAL_UPLOAD_DIR: /app/uploads
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - app-uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      arbit-ai:
        condition: service_started
    networks:
      - arbit-network
    restart: unless-stopped

  arbit-ai:
    container_name: arbit-ai
    build:
      context: ../arbit-ai
      dockerfile: Dockerfile
    env_file:
      - ../arbit-ai/.env
    environment:
      APP_DB_URL: ${APP_DB_URL:-jdbc:mysql://arbit-db:3306/${MYSQL_DATABASE:-arbit}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
      APP_DB_USERNAME: ${APP_DB_USERNAME:-${MYSQL_USER:-arbit}}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-${MYSQL_PASSWORD}}
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - arbit-network
    restart: unless-stopped

volumes:
  app-uploads:
  db-data:

networks:
  arbit-network:
