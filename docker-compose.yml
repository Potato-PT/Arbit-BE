services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arbit-app
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
      SERVER_PORT: 8080
      DB_URL: ${DOCKER_DB_URL:-jdbc:mysql://mysql:3306/arbitdb?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
      DB_USERNAME: ${DOCKER_DB_USERNAME:-root}
      DB_PASSWORD: ${DOCKER_DB_PASSWORD:-root}
      JWT_SECRET: ${JWT_SECRET:-change-this-development-secret-change-this-development-secret}
      JWT_ACCESS_TOKEN_VALIDITY_MS: ${JWT_ACCESS_TOKEN_VALIDITY_MS:-3600000}
      JWT_REFRESH_TOKEN_VALIDITY_MS: ${JWT_REFRESH_TOKEN_VALIDITY_MS:-1209600000}
      KAKAO_REST_API_KEY: ${KAKAO_REST_API_KEY:-}
      STORAGE_LOCAL_UPLOAD_DIR: /app/uploads
    ports:
      - "${APP_PORT:-8081}:8080"
    volumes:
      - app-uploads:/app/uploads
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    container_name: arbitdb
    environment:
      MYSQL_DATABASE: arbitdb
      MYSQL_ROOT_PASSWORD: ${DOCKER_DB_PASSWORD:-root}
      TZ: Asia/Seoul
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

volumes:
  app-uploads:
  mysql-data:
