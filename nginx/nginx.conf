upstream arbit_backend {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.piec.store 34.75.191.26;

    return 301 https://api.piec.store$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.piec.store;

    ssl_certificate /etc/letsencrypt/live/api.piec.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.piec.store/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 10m;

    location / {
        proxy_pass http://arbit_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
