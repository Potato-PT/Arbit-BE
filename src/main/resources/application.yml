spring:
  application:
    name: arbit
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/arbit?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:arbit}
    password: ${DB_PASSWORD:arbit}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: ${JWT_SECRET:change-this-development-secret-change-this-development-secret}
  access-token-validity-ms: ${JWT_ACCESS_TOKEN_VALIDITY_MS:3600000}

server:
  error:
    include-message: never
