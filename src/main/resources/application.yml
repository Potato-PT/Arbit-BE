spring:
  application:
    name: arbit
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: ${APP_DB_URL}
    username: ${APP_DB_USERNAME}
    password: ${APP_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: ${GCP_JWT_SECRET}
  access-token-validity-ms: ${JWT_ACCESS_TOKEN_VALIDITY_MS:3600000}
  refresh-token-validity-ms: ${JWT_REFRESH_TOKEN_VALIDITY_MS:1209600000}

kakao:
  local:
    base-url: ${KAKAO_LOCAL_BASE_URL:https://dapi.kakao.com}
    rest-api-key: ${KAKAO_REST_API_KEY}

arbit-ai:
  base-url: ${ARBIT_AI_BASE_URL:http://arbit-ai:8000}

app:
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:https://piec.store,https://arbit-umber.vercel.app,http://localhost:[*],http://127.0.0.1:[*]}

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
