spring:
  application:
    name: arbit
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/arbitdb?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: ${JWT_SECRET:change-this-development-secret-change-this-development-secret}
  access-token-validity-ms: ${JWT_ACCESS_TOKEN_VALIDITY_MS:3600000}
  refresh-token-validity-ms: ${JWT_REFRESH_TOKEN_VALIDITY_MS:1209600000}

kakao:
  local:
    base-url: ${KAKAO_LOCAL_BASE_URL:https://dapi.kakao.com}
    rest-api-key: ${KAKAO_REST_API_KEY:}

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
